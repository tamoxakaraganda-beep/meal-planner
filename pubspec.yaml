name: meal_planner
description: A comprehensive meal planning application for dietary management and shopping optimization.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  image_picker: ^1.0.0
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Authentication
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  
  # API & Networking
  http: ^1.1.0
  dio: ^5.3.0
  
  # JSON Serialization
  json_annotation: ^4.8.0
  
  # UI & Navigation
  go_router: ^12.0.0
  
  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  
  # Charts for Progress
  fl_chart: ^0.64.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true